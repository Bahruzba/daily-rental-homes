services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5099:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=DailyRentalHomes;User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD};TrustServerCertificate=True
      Token__Issuer: DailyRentalHomes
      Token__Audience: DailyRentalHomesClients
      Token__Key: ${TOKEN_KEY:?Set TOKEN_KEY}
      Token__Minutes: 1440
      Notifications__WorkerEnabled: "false"
    depends_on:
      sqlserver:
        condition: service_started

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
