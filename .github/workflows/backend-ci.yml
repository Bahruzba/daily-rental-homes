name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore DailyRentalHomes.slnx

      - name: Build
        working-directory: backend
        run: dotnet build DailyRentalHomes.slnx --configuration Release --no-restore
